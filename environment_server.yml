name: flow
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R
  - r-base=4.4
  - r-irkernel
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-pheatmap
  - r-viridis
  - r-patchwork
  - r-uwot
  - r-rtsne
  # Bioconductor
  - bioconductor-flowcore
  - bioconductor-flowworkspace
  - bioconductor-ggcyto
  - bioconductor-opencyto
  - bioconductor-flowsom
  - bioconductor-sva               # ComBat backend for cyCombine (notebook 4)
  - bioconductor-complexheatmap    # PeacoQC dependency (notebook 4)
  - r-remotes                      # for installing GitHub-only batch-correction pkgs
  # Python
  - python=3.11
  - jupyter
  - jupyterlab
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - umap-learn
  # pip-only packages
  - pip
  - pip:
      - flowkit
      - fcsparser
      - leidenalg
