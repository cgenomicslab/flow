name: flow
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R
  - r-base=4.4
  - r-irkernel
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-readr
  - r-pheatmap
  - r-viridis
  - r-patchwork
  - r-uwot
  - r-rtsne
  # Bioconductor (available on Linux/x86; may need R install on osx-arm64)
  # - bioconductor-flowcore
  # - bioconductor-flowworkspace
  # - bioconductor-ggcyto
  # - bioconductor-opencyto
  # - bioconductor-flowsom
  # Python
  - python=3.11
  - jupyter
  - jupyterlab
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - umap-learn
  # pip-only packages
  - pip
  - pip:
      - flowkit
      - fcsparser
      - leidenalg
